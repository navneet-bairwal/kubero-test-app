<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kubero Test App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 2rem;
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      max-width: 500px;
      width: 90%;
    }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .subtitle { font-size: 1.1rem; opacity: 0.9; margin-bottom: 1.5rem; }
    .status {
      display: inline-block;
      padding: 0.5rem 1.5rem;
      background: rgba(255,255,255,0.2);
      border-radius: 50px;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .status .dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .info { font-size: 0.85rem; opacity: 0.7; margin-top: 1rem; }
    .info span { display: block; margin: 0.3rem 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Kubero Test App</h1>
    <p class="subtitle">Deployed with Kubero on Kubernetes</p>
    <div class="status"><span class="dot"></span> Running</div>
    <div class="info">
      <span id="time"></span>
      <span>Node.js + Express</span>
    </div>
  </div>
  <script>
    function updateTime() {
      document.getElementById('time').textContent = new Date().toLocaleString();
    }
    updateTime();
    setInterval(updateTime, 1000);
  </script>
</body>
</html>
